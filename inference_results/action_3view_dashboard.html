<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenVLA 三视图逐帧对比</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f2;
      --panel: #ffffff;
      --ink: #20231f;
      --muted: #626960;
      --line: #d9ded6;
      --soft: #eef1ec;
      --true: #1f7a4d;
      --pred: #1f5fb8;
      --err: #c7472f;
      --axis-x: #bd3f32;
      --axis-y: #257747;
      --axis-z: #265fb5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      padding: 16px 18px 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
    }

    h1 {
      margin: 0 0 5px;
      font-size: 23px;
      line-height: 1.2;
      font-weight: 740;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      white-space: nowrap;
    }

    .swatch {
      display: inline-block;
      width: 22px;
      height: 3px;
      border-radius: 2px;
    }

    main {
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 18px 22px;
      display: grid;
      gap: 14px;
    }

    .views {
      display: grid;
      grid-template-columns: minmax(260px, 0.92fr) minmax(320px, 1fr) minmax(320px, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      min-width: 0;
    }

    .view-panel {
      display: grid;
      grid-template-rows: auto minmax(320px, 1fr) auto;
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 13px 10px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
    }

    .metric {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .image-stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 12px;
      background:
        linear-gradient(90deg, rgba(32, 35, 31, 0.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(32, 35, 31, 0.045) 1px, transparent 1px),
        #f9faf7;
      background-size: 22px 22px;
    }

    .image-box {
      position: relative;
      width: min(100%, 520px);
      aspect-ratio: 1 / 1;
    }

    .image-stage img {
      width: min(100%, 520px);
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--soft);
      display: block;
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      background:
        linear-gradient(90deg, rgba(32, 35, 31, 0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(32, 35, 31, 0.04) 1px, transparent 1px),
        #fbfcfa;
      background-size: 26px 26px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 420px;
    }

    .view-foot {
      border-top: 1px solid var(--line);
      padding: 10px 13px;
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      border-radius: 6px;
      padding: 0 14px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      border-color: #aeb7af;
      background: #fbfcfb;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--ink);
    }

    .step-label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .details {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 14px;
    }

    .table-panel,
    .summary-panel {
      padding: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 8px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 7px 4px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    th:first-child,
    td:first-child {
      text-align: left;
      color: var(--muted);
    }

    .summary-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      min-width: 0;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 720;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    @media (max-width: 1120px) {
      .header-inner,
      .views,
      .details {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 460px;
      }
    }

    @media (max-width: 640px) {
      .header-inner,
      main {
        padding-left: 10px;
        padding-right: 10px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-inner">
        <div>
          <h1>三视图逐帧对比</h1>
          <div class="subtle" id="sourceLine">加载中</div>
        </div>
        <div class="legend">
          <span class="legend-item"><span class="swatch" style="background: var(--true)"></span>真实轨迹</span>
          <span class="legend-item"><span class="swatch" style="background: var(--pred)"></span>预测轨迹</span>
          <span class="legend-item"><span class="swatch" style="background: var(--axis-x)"></span>X</span>
          <span class="legend-item"><span class="swatch" style="background: var(--axis-y)"></span>Y</span>
          <span class="legend-item"><span class="swatch" style="background: var(--axis-z)"></span>Z</span>
        </div>
      </div>
    </header>

    <main>
      <section class="views">
        <article class="panel view-panel">
          <div class="panel-head">
            <h2>真实图片 image_0</h2>
            <div class="metric" id="imageStep">step 0</div>
          </div>
          <div class="image-stage">
            <div class="image-box">
              <img id="frameImage" alt="Bridge image_0 当前帧">
            </div>
          </div>
          <div class="view-foot">
          <div id="imagePath" class="mono">-</div>
          <div id="instructionText">-</div>
          </div>
        </article>

        <article class="panel view-panel">
          <div class="panel-head">
            <h2>真实动作 3D 机械爪</h2>
            <div class="metric" id="truePoseMetric">-</div>
          </div>
          <div class="canvas-wrap">
            <canvas id="trueCanvas"></canvas>
          </div>
          <div class="view-foot">
            <div id="truePoseText" class="mono">-</div>
            <div id="trueGripText">-</div>
          </div>
        </article>

        <article class="panel view-panel">
          <div class="panel-head">
            <h2>预测动作 3D 机械爪</h2>
            <div class="metric" id="predPoseMetric">-</div>
          </div>
          <div class="canvas-wrap">
            <canvas id="predCanvas"></canvas>
          </div>
          <div class="view-foot">
            <div id="predPoseText" class="mono">-</div>
            <div id="predGripText">-</div>
          </div>
        </article>
      </section>

      <section class="panel controls">
        <button id="playButton" type="button">播放</button>
        <input id="stepSlider" type="range" min="0" max="27" step="1" value="0" aria-label="step">
        <div id="stepLabel" class="step-label">step 0 / 27</div>
      </section>

      <section class="details">
        <article class="panel table-panel">
          <h2>当前帧七维动作</h2>
          <table aria-label="当前帧 true pred err">
            <thead>
              <tr>
                <th>维度</th>
                <th>真实</th>
                <th>预测</th>
                <th>绝对误差</th>
              </tr>
            </thead>
            <tbody id="valueRows"></tbody>
          </table>
        </article>

        <article class="panel summary-panel">
          <h2>误差汇总</h2>
          <div class="summary-grid">
            <div class="stat">
              <div class="stat-label">当前 MAE</div>
              <div id="currentMae" class="stat-value mono">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">全段 MAE</div>
              <div id="meanMae" class="stat-value mono">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">最大当前误差</div>
              <div id="maxDimError" class="stat-value mono">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">步数</div>
              <div id="numSteps" class="stat-value mono">-</div>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script>
    const CSV_PATH = "openvla_inference_all_steps_image_0.csv";
    const DIMS = ["dx", "dy", "dz", "droll", "dpitch", "dyaw", "gripper"];
    const LABELS = {
      dx: "dx",
      dy: "dy",
      dz: "dz",
      droll: "droll",
      dpitch: "dpitch",
      dyaw: "dyaw",
      gripper: "gripper",
    };
    const COLORS = {
      true: "#1f7a4d",
      pred: "#1f5fb8",
      body: "#d9ded6",
      bodyStroke: "#737b73",
      dark: "#20231f",
      grid: "#d9ded6",
      x: "#bd3f32",
      y: "#257747",
      z: "#265fb5",
      err: "#c7472f",
    };

    const state = {
      rows: [],
      trueStates: [],
      predStates: [],
      step: 0,
      playing: false,
      timer: null,
      scale: 7.0,
      bounds: null,
      instruction: "put small spoon from basket to tray",
    };

    const CAMERA = {
      // Approximate image_0's oblique top-down viewpoint. This is a visual alignment only;
      // the Bridge sample does not include camera calibration for exact robot-to-image projection.
      yaw: -2.35,
      pitch: -0.78,
      focalScale: 0.88,
      centerY: 0.56,
    };

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(",");
      return lines.slice(1).map((line) => {
        const values = line.split(",");
        const row = {};
        headers.forEach((header, index) => {
          row[header] = header === "image" ? values[index] : Number(values[index]);
        });
        return row;
      });
    }

    function fmt(value) {
      if (!Number.isFinite(value)) return "-";
      const abs = Math.abs(value);
      if (abs > 0 && abs < 0.0001) return value.toExponential(3);
      return value.toFixed(6);
    }

    function buildStates(rows, prefix) {
      const pos = { x: 0, y: 0, z: 0 };
      const rot = { roll: 0, pitch: 0, yaw: 0 };
      const out = [];
      rows.forEach((row) => {
        pos.x += row[`${prefix}_dx`];
        pos.y += row[`${prefix}_dy`];
        pos.z += row[`${prefix}_dz`];
        rot.roll += row[`${prefix}_droll`];
        rot.pitch += row[`${prefix}_dpitch`];
        rot.yaw += row[`${prefix}_dyaw`];
        out.push({
          step: row.step,
          pos: { ...pos },
          rot: { ...rot },
          grip: row[`${prefix}_gripper`],
        });
      });
      return out;
    }

    function computeBounds(...stateLists) {
      const pts = stateLists.flat().map((item) => item.pos);
      const xs = pts.map((p) => p.x);
      const ys = pts.map((p) => p.y);
      const zs = pts.map((p) => p.z);
      return {
        minX: Math.min(...xs),
        maxX: Math.max(...xs),
        minY: Math.min(...ys),
        maxY: Math.max(...ys),
        minZ: Math.min(...zs),
        maxZ: Math.max(...zs),
      };
    }

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, width: rect.width, height: rect.height };
    }

    function rotateLocal(point, rot) {
      let { x, y, z } = point;
      const cr = Math.cos(rot.roll), sr = Math.sin(rot.roll);
      const cp = Math.cos(rot.pitch), sp = Math.sin(rot.pitch);
      const cy = Math.cos(rot.yaw), sy = Math.sin(rot.yaw);

      let y1 = y * cr - z * sr;
      let z1 = y * sr + z * cr;
      y = y1;
      z = z1;

      let x2 = x * cp + z * sp;
      let z2 = -x * sp + z * cp;
      x = x2;
      z = z2;

      let x3 = x * cy - y * sy;
      let y3 = x * sy + y * cy;
      return { x: x3, y: y3, z };
    }

    function add(a, b) {
      return { x: a.x + b.x, y: a.y + b.y, z: a.z + b.z };
    }

    function scalePoint(p, s) {
      return { x: p.x * s, y: p.y * s, z: p.z * s };
    }

    function cameraTransform(p) {
      const yaw = CAMERA.yaw;
      const pitch = CAMERA.pitch;
      const cy = Math.cos(yaw), sy = Math.sin(yaw);
      const cp = Math.cos(pitch), sp = Math.sin(pitch);

      let x = p.x * cy - p.y * sy;
      let y = p.x * sy + p.y * cy;
      let z = p.z;

      let y2 = y * cp - z * sp;
      let z2 = y * sp + z * cp;
      return { x, y: y2, z: z2 };
    }

    function project(p, width, height) {
      const c = cameraTransform(p);
      const focal = Math.min(width, height) * CAMERA.focalScale;
      const depth = 6.5 - c.z;
      const s = focal / Math.max(1.5, depth);
      return {
        x: width / 2 + c.x * s,
        y: height * CAMERA.centerY - c.y * s,
        depth,
      };
    }

    function drawLine3d(ctx, a, b, width, height, color, lineWidth = 2) {
      const pa = project(a, width, height);
      const pb = project(b, width, height);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
      ctx.restore();
    }

    function drawPoly(ctx, points, width, height, fill, stroke) {
      const projected = points.map((p) => project(p, width, height));
      ctx.save();
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      projected.forEach((p, idx) => {
        if (idx === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function boxFaces(center, size, rot) {
      const hx = size.x / 2;
      const hy = size.y / 2;
      const hz = size.z / 2;
      const corners = [
        { x: -hx, y: -hy, z: -hz }, { x: hx, y: -hy, z: -hz },
        { x: hx, y: hy, z: -hz }, { x: -hx, y: hy, z: -hz },
        { x: -hx, y: -hy, z: hz }, { x: hx, y: -hy, z: hz },
        { x: hx, y: hy, z: hz }, { x: -hx, y: hy, z: hz },
      ].map((p) => add(center, rotateLocal(p, rot)));

      return [
        [corners[0], corners[1], corners[2], corners[3]],
        [corners[4], corners[5], corners[6], corners[7]],
        [corners[0], corners[1], corners[5], corners[4]],
        [corners[2], corners[3], corners[7], corners[6]],
        [corners[1], corners[2], corners[6], corners[5]],
        [corners[3], corners[0], corners[4], corners[7]],
      ];
    }

    function faceDepth(face) {
      return face.reduce((sum, p) => sum + cameraTransform(p).z, 0) / face.length;
    }

    function drawBox(ctx, center, size, rot, width, height, fill = COLORS.body) {
      const faces = boxFaces(center, size, rot).sort((a, b) => faceDepth(a) - faceDepth(b));
      faces.forEach((face, idx) => {
        const shade = idx < 2 ? 0.93 : idx < 4 ? 0.98 : 1.03;
        drawPoly(ctx, face, width, height, shadeColor(fill, shade), COLORS.bodyStroke);
      });
    }

    function shadeColor(hex, factor) {
      const value = hex.replace("#", "");
      const r = Math.max(0, Math.min(255, Math.round(parseInt(value.slice(0, 2), 16) * factor)));
      const g = Math.max(0, Math.min(255, Math.round(parseInt(value.slice(2, 4), 16) * factor)));
      const b = Math.max(0, Math.min(255, Math.round(parseInt(value.slice(4, 6), 16) * factor)));
      return `rgb(${r}, ${g}, ${b})`;
    }

    function scenePosition(rawPos) {
      const b = state.bounds;
      const cx = (b.minX + b.maxX) / 2;
      const cy = (b.minY + b.maxY) / 2;
      const cz = (b.minZ + b.maxZ) / 2;
      return {
        x: (rawPos.x - cx) * state.scale,
        y: (rawPos.y - cy) * state.scale,
        z: (rawPos.z - cz) * state.scale + 0.75,
      };
    }

    function drawGrid(ctx, width, height) {
      const z = 0;
      for (let i = -4; i <= 4; i++) {
        const tone = i === 0 ? "#bcc5bd" : "#dce1da";
        drawLine3d(ctx, { x: -2.2, y: i * 0.32, z }, { x: 2.2, y: i * 0.32, z }, width, height, tone, i === 0 ? 1.4 : 1);
        drawLine3d(ctx, { x: i * 0.32, y: -1.55, z }, { x: i * 0.32, y: 1.55, z }, width, height, tone, i === 0 ? 1.4 : 1);
      }
      drawLine3d(ctx, { x: -2.2, y: 0, z }, { x: 2.2, y: 0, z }, width, height, COLORS.x, 1.8);
      drawLine3d(ctx, { x: 0, y: -1.55, z }, { x: 0, y: 1.55, z }, width, height, COLORS.y, 1.8);
      drawLine3d(ctx, { x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 1.45 }, width, height, COLORS.z, 1.8);
    }

    function drawTrajectory(ctx, states, step, width, height, color) {
      if (step <= 0) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.1;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();
      for (let i = 0; i <= step; i++) {
        const p = project(scenePosition(states[i].pos), width, height);
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawAxes(ctx, center, rot, width, height) {
      const length = 0.36;
      const axes = [
        [{ x: length, y: 0, z: 0 }, COLORS.x, "x"],
        [{ x: 0, y: length, z: 0 }, COLORS.y, "y"],
        [{ x: 0, y: 0, z: length }, COLORS.z, "z"],
      ];
      axes.forEach(([local, color, label]) => {
        const end = add(center, rotateLocal(local, rot));
        drawLine3d(ctx, center, end, width, height, color, 3);
        const p = project(end, width, height);
        ctx.save();
        ctx.fillStyle = color;
        ctx.font = "600 12px Inter, system-ui, sans-serif";
        ctx.fillText(label, p.x + 4, p.y - 4);
        ctx.restore();
      });
    }

    function drawGripper(ctx, item, states, step, width, height, color, title) {
      ctx.clearRect(0, 0, width, height);
      drawGrid(ctx, width, height);
      drawTrajectory(ctx, states, step, width, height, color);

      const center = scenePosition(item.pos);
      const rot = item.rot;
      const wristBack = add(center, rotateLocal({ x: -0.55, y: 0, z: 0 }, rot));
      const palm = add(center, rotateLocal({ x: 0.08, y: 0, z: 0 }, rot));
      const spread = 0.11 + Math.max(0, Math.min(1, item.grip)) * 0.24;
      const fingerX = 0.48;
      const fingerLen = 0.52;

      drawLine3d(ctx, wristBack, center, width, height, "#879088", 8);
      drawBox(ctx, add(center, rotateLocal({ x: -0.18, y: 0, z: 0 }, rot)), { x: 0.34, y: 0.22, z: 0.22 }, rot, width, height, "#cfd6cf");
      drawBox(ctx, palm, { x: 0.25, y: 0.54, z: 0.24 }, rot, width, height, "#dfe4dd");

      const leftFingerBase = add(center, rotateLocal({ x: fingerX, y: spread, z: 0 }, rot));
      const rightFingerBase = add(center, rotateLocal({ x: fingerX, y: -spread, z: 0 }, rot));
      const leftTip = add(center, rotateLocal({ x: fingerX + fingerLen, y: spread * 0.72, z: 0 }, rot));
      const rightTip = add(center, rotateLocal({ x: fingerX + fingerLen, y: -spread * 0.72, z: 0 }, rot));

      drawBox(ctx, leftFingerBase, { x: fingerLen, y: 0.105, z: 0.15 }, rot, width, height, "#f2f4f0");
      drawBox(ctx, rightFingerBase, { x: fingerLen, y: 0.105, z: 0.15 }, rot, width, height, "#f2f4f0");
      drawLine3d(ctx, leftFingerBase, leftTip, width, height, "#697169", 3);
      drawLine3d(ctx, rightFingerBase, rightTip, width, height, "#697169", 3);

      drawAxes(ctx, center, rot, width, height);
      const projected = project(center, width, height);
      ctx.save();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(projected.x, projected.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#20231f";
      ctx.font = "600 13px Inter, system-ui, sans-serif";
      ctx.fillText(title, 14, 22);
      ctx.restore();
    }

    function drawScene(canvasId, states, color, title) {
      const canvas = document.getElementById(canvasId);
      const { ctx, width, height } = resizeCanvas(canvas);
      drawGripper(ctx, states[state.step], states, state.step, width, height, color, title);
    }

    function updateImage() {
      const row = state.rows[state.step];
      const imageStep = Math.min(state.step + 1, state.rows.length - 1);
      const imageRow = state.rows[imageStep];
      const src = imageRow.image.startsWith("/") ? imageRow.image : `../${imageRow.image}`;
      document.getElementById("frameImage").src = src;
      document.getElementById("imageStep").textContent = `action step ${row.step} -> image step ${imageRow.step}`;
      document.getElementById("imagePath").textContent = imageRow.image;
      document.getElementById("instructionText").textContent = state.instruction;
    }

    function updatePoseText() {
      const t = state.trueStates[state.step];
      const p = state.predStates[state.step];
      const truePos = `pos(${fmt(t.pos.x)}, ${fmt(t.pos.y)}, ${fmt(t.pos.z)})`;
      const predPos = `pos(${fmt(p.pos.x)}, ${fmt(p.pos.y)}, ${fmt(p.pos.z)})`;
      document.getElementById("truePoseMetric").textContent = `gripper ${fmt(t.grip)}`;
      document.getElementById("predPoseMetric").textContent = `gripper ${fmt(p.grip)}`;
      document.getElementById("truePoseText").textContent = truePos;
      document.getElementById("predPoseText").textContent = predPos;
      document.getElementById("trueGripText").textContent = `roll ${fmt(t.rot.roll)}  pitch ${fmt(t.rot.pitch)}  yaw ${fmt(t.rot.yaw)}`;
      document.getElementById("predGripText").textContent = `roll ${fmt(p.rot.roll)}  pitch ${fmt(p.rot.pitch)}  yaw ${fmt(p.rot.yaw)}`;
    }

    function updateTable() {
      const row = state.rows[state.step];
      const body = document.getElementById("valueRows");
      body.innerHTML = "";
      DIMS.forEach((dim) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${LABELS[dim]}</td>
          <td class="mono">${fmt(row[`true_${dim}`])}</td>
          <td class="mono">${fmt(row[`pred_${dim}`])}</td>
          <td class="mono">${fmt(row[`err_${dim}`])}</td>
        `;
        body.appendChild(tr);
      });
      const errors = DIMS.map((dim) => row[`err_${dim}`]);
      document.getElementById("currentMae").textContent = fmt(row.mean_abs_error);
      document.getElementById("maxDimError").textContent = fmt(Math.max(...errors));
    }

    function updateControls() {
      document.getElementById("stepSlider").value = state.step;
      document.getElementById("stepLabel").textContent = `step ${state.step} / ${state.rows.length - 1}`;
    }

    function render() {
      if (!state.rows.length) return;
      updateImage();
      updatePoseText();
      updateTable();
      updateControls();
      drawScene("trueCanvas", state.trueStates, COLORS.true, "true");
      drawScene("predCanvas", state.predStates, COLORS.pred, "pred");
    }

    function setPlaying(next) {
      state.playing = next;
      document.getElementById("playButton").textContent = next ? "暂停" : "播放";
      if (state.timer) {
        window.clearInterval(state.timer);
        state.timer = null;
      }
      if (next) {
        state.timer = window.setInterval(() => {
          state.step = (state.step + 1) % state.rows.length;
          render();
        }, 650);
      }
    }

    async function init() {
      const response = await fetch(CSV_PATH);
      if (!response.ok) throw new Error(`无法读取 ${CSV_PATH}`);
      state.rows = parseCsv(await response.text());
      state.trueStates = buildStates(state.rows, "true");
      state.predStates = buildStates(state.rows, "pred");
      state.bounds = computeBounds(state.trueStates, state.predStates);

      const meanMae = state.rows.reduce((sum, row) => sum + row.mean_abs_error, 0) / state.rows.length;
      document.getElementById("meanMae").textContent = fmt(meanMae);
      document.getElementById("numSteps").textContent = String(state.rows.length);
      document.getElementById("sourceLine").textContent = `${CSV_PATH} · image_0 shifted +1 frame · 3D view approximately aligned to image_0 perspective · ${state.rows.length} action steps`;
      document.getElementById("stepSlider").max = String(state.rows.length - 1);
      document.getElementById("stepSlider").addEventListener("input", (event) => {
        state.step = Number(event.target.value);
        render();
      });
      document.getElementById("playButton").addEventListener("click", () => setPlaying(!state.playing));
      window.addEventListener("resize", render);
      render();
    }

    init().catch((error) => {
      document.body.innerHTML = `<pre style="padding:20px;color:#c7472f">${error.stack || error}</pre>`;
    });
  </script>
</body>
</html>
